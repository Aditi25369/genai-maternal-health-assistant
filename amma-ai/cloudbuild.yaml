steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/amma-ai', '.']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/amma-ai']
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - amma-ai
      - --image=gcr.io/$PROJECT_ID/amma-ai
      - --region=asia-south1
      - --platform=managed
      - --allow-unauthenticated
      - --set-env-vars=GEMINI_API_KEY=$_GEMINI_API_KEY
      - --memory=512Mi
      - --port=8080

substitutions:
  _GEMINI_API_KEY: 'your-gemini-api-key'

images:
  - 'gcr.io/$PROJECT_ID/amma-ai'
